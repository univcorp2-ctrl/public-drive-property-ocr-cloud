<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">LIFF property volume chat architecture</title>
  <desc id="desc">Architecture diagram for LIFF frontend, FastAPI backend, auth, OCR, volume logic, SQLite and export artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#ecfff4"/><stop offset="100%" stop-color="#eef4ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#102a43" flood-opacity="0.18"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
    <style>.card{fill:#fff;stroke:#d7e2ee;stroke-width:2;filter:url(#shadow)}.title{font:700 25px system-ui,-apple-system,Segoe UI,sans-serif;fill:#102a43}.text{font:500 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334e68}.small{font:500 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#627d98}.pill{fill:#06c755}.pillText{font:800 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#fff}.line{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}.dashed{stroke-dasharray:8 8}</style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="64" y="70" class="title" font-size="34">ボリューム検討チャット Clone Architecture</text>
  <text x="64" y="104" class="text">LINE LIFF入口から、認証・OCR・ボリューム判定・出力生成までを独自実装で構成</text>
  <rect x="64" y="160" width="230" height="130" rx="24" class="card"/>
  <text x="94" y="205" class="title">User</text><text x="94" y="237" class="text">LINE / Browser</text><text x="94" y="265" class="small">画像・資料・note ID</text>
  <rect x="380" y="130" width="280" height="190" rx="24" class="card"/>
  <rect x="410" y="158" width="86" height="28" rx="14" class="pill"/><text x="427" y="178" class="pillText">Frontend</text>
  <text x="410" y="218" class="title">LIFF Static UI</text><text x="410" y="250" class="text">liff.init / note ID入力</text><text x="410" y="278" class="text">ファイルアップロード</text>
  <rect x="760" y="130" width="320" height="190" rx="24" class="card"/>
  <rect x="790" y="158" width="88" height="28" rx="14" class="pill"/><text x="808" y="178" class="pillText">Backend</text>
  <text x="790" y="218" class="title">FastAPI</text><text x="790" y="250" class="text">/api/session / /api/analyze</text><text x="790" y="278" class="text">REST + multipart upload</text>
  <rect x="124" y="420" width="220" height="130" rx="24" class="card"/><text x="154" y="464" class="title">note ID Auth</text><text x="154" y="496" class="text">Allowlist / Open</text><text x="154" y="524" class="small">認証回避なし</text>
  <rect x="408" y="420" width="220" height="130" rx="24" class="card"/><text x="438" y="464" class="title">OCR Adapter</text><text x="438" y="496" class="text">fallback / provider</text><text x="438" y="524" class="small">差し替え可能</text>
  <rect x="692" y="420" width="240" height="130" rx="24" class="card"/><text x="722" y="464" class="title">Volume Logic</text><text x="722" y="496" class="text">FAR / BCR / Road</text><text x="722" y="524" class="small">概算判定</text>
  <rect x="996" y="420" width="220" height="130" rx="24" class="card"/><text x="1026" y="464" class="title">Exports</text><text x="1026" y="496" class="text">CSV / Excel / TXT</text><text x="1026" y="524" class="small">artifact保存</text>
  <rect x="760" y="610" width="320" height="90" rx="24" class="card"/><text x="790" y="652" class="title">SQLite</text><text x="790" y="680" class="text">sessions / jobs / output paths</text>
  <path d="M294 225 C326 225 342 225 380 225" class="line"/><path d="M660 225 C700 225 720 225 760 225" class="line"/>
  <path d="M868 320 C760 370 405 370 274 420" class="line"/><path d="M875 320 C780 376 608 382 528 420" class="line"/>
  <path d="M904 320 C872 360 842 384 820 420" class="line"/><path d="M932 485 C958 485 970 485 996 485" class="line"/><path d="M920 320 L920 610" class="line dashed"/>
</svg>
