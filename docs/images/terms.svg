<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560"><style>.t{font-family:Arial,'Noto Sans JP',sans-serif;fill:#111827}.h{font-size:28px;font-weight:700}.s{font-size:17px}.box{fill:#fff;stroke:#c4b5fd;stroke-width:2;rx:16}.label{font-size:20px;font-weight:700}</style><rect width="1100" height="560" fill="#fbfaff"/><text x="40" y="55" class="t h">用語の整理</text><rect x="50" y="100" width="300" height="100" class="box"/><text x="75" y="137" class="t label">Google Driveフォルダ</text><text x="75" y="170" class="t s">物件資料を置く箱</text><rect x="400" y="100" width="300" height="100" class="box"/><text x="425" y="137" class="t label">サービスアカウント</text><text x="425" y="170" class="t s">プログラム専用のGoogleアカウント</text><rect x="750" y="100" width="300" height="100" class="box"/><text x="775" y="137" class="t label">JSONキー</text><text x="775" y="170" class="t s">サービスアカウントの鍵。公開禁止</text><rect x="50" y="250" width="300" height="100" class="box"/><text x="75" y="287" class="t label">GitHub Secrets</text><text x="75" y="320" class="t s">鍵やIDを安全に入れる場所</text><rect x="400" y="250" width="300" height="100" class="box"/><text x="425" y="287" class="t label">GitHub Actions</text><text x="425" y="320" class="t s">GitHub上で自動実行される処理</text><rect x="750" y="250" width="300" height="100" class="box"/><text x="775" y="287" class="t label">artifact</text><text x="775" y="320" class="t s">結果ファイルをダウンロードする箱</text><rect x="170" y="405" width="760" height="82" fill="#eef2ff" stroke="#a5b4fc" rx="16"/><text x="205" y="455" class="t s">秘密情報はコードに書かず、GitHub Secretsに入れてActions実行時だけ使います。</text></svg>