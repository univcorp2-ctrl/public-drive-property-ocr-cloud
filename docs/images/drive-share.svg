<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#ea580c"/></marker><style>.t{font-family:Arial,'Noto Sans JP',sans-serif;fill:#111827}.h{font-size:28px;font-weight:700}.s{font-size:17px}.box{fill:#fff;stroke:#fdba74;stroke-width:2;rx:18}.arrow{stroke:#ea580c;stroke-width:3;fill:none;marker-end:url(#a)}</style></defs><rect width="1100" height="500" fill="#fff7ed"/><text x="40" y="55" class="t h">Google Driveフォルダをサービスアカウントに共有</text><rect x="70" y="120" width="240" height="110" class="box"/><text x="100" y="160" class="t s">対象フォルダを右クリック</text><text x="100" y="195" class="t s">「共有」を押す</text><rect x="430" y="120" width="260" height="110" class="box"/><text x="460" y="160" class="t s">サービスアカウントの</text><text x="460" y="195" class="t s">メールアドレスを入力</text><rect x="810" y="120" width="220" height="110" class="box"/><text x="840" y="160" class="t s">権限は「閲覧者」</text><text x="840" y="195" class="t s">にする</text><path d="M310 175 H430" class="arrow"/><path d="M690 175 H810" class="arrow"/><rect x="120" y="310" width="860" height="95" fill="#ffffff" stroke="#fed7aa" rx="18"/><text x="155" y="348" class="t s">共有するメール例: property-ocr-drive-reader@your-project.iam.gserviceaccount.com</text><text x="155" y="382" class="t s">Drive全体ではなく、対象フォルダだけ共有するのが安全です。</text></svg>