<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">Property OCR volume analysis logic flow</title>
  <desc id="desc">Logic flow from LIFF initialization to note ID authentication, OCR, parsing, FAR calculation, export generation and download links.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f8fbff"/><stop offset="100%" stop-color="#effdf5"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#102a43" flood-opacity="0.16"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/></marker>
    <style>.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.decision{fill:#fff7ed;stroke:#fdba74;stroke-width:2;filter:url(#shadow)}.title{font:800 34px system-ui,-apple-system,Segoe UI,sans-serif;fill:#102a43}.step{font:800 21px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f172a}.text{font:500 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}.line{stroke:#0f766e;stroke-width:4;fill:none;marker-end:url(#arrow)}.label{font:800 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0f766e}</style>
  </defs>
  <rect width="1280" height="980" fill="url(#bg)"/>
  <text x="64" y="68" class="title">ロジック画像: OCR → ボリューム判定 → 出力</text>
  <rect x="90" y="120" width="250" height="90" rx="22" class="box"/><text x="122" y="156" class="step">1. 起動</text><text x="122" y="184" class="text">LIFF URL または通常Web</text>
  <path d="M340 165 H430" class="line"/>
  <polygon points="500,110 620,165 500,220 380,165" class="decision"/><text x="450" y="158" class="step">LIFF_ID</text><text x="466" y="184" class="text">あり?</text>
  <path d="M620 165 H710" class="line"/>
  <rect x="710" y="120" width="250" height="90" rx="22" class="box"/><text x="742" y="156" class="step">2A. liff.init</text><text x="742" y="184" class="text">LINE内/外部ブラウザ判定</text>
  <path d="M500 220 V285 H710" class="line"/>
  <rect x="710" y="252" width="250" height="90" rx="22" class="box"/><text x="742" y="288" class="step">2B. Web demo</text><text x="742" y="316" class="text">LIFFなしでも動作確認</text>
  <path d="M960 165 H1030 V385 H1010" class="line"/><path d="M960 297 H1030" class="line"/>
  <rect x="760" y="370" width="250" height="90" rx="22" class="box"/><text x="792" y="406" class="step">3. note ID認証</text><text x="792" y="434" class="text">許可リストでtoken発行</text>
  <path d="M760 415 H650" class="line"/>
  <rect x="400" y="370" width="250" height="90" rx="22" class="box"/><text x="432" y="406" class="step">4. 画像アップロード</text><text x="432" y="434" class="text">資料 + OCR補助テキスト</text>
  <path d="M400 415 H290 V560 H330" class="line"/>
  <rect x="330" y="515" width="260" height="90" rx="22" class="box"/><text x="362" y="551" class="step">5. OCR Adapter</text><text x="362" y="579" class="text">manual text + OCR結果を統合</text>
  <path d="M590 560 H690" class="line"/>
  <rect x="690" y="515" width="270" height="90" rx="22" class="box"/><text x="722" y="551" class="step">6. 項目抽出</text><text x="722" y="579" class="text">面積/用途/建ぺい率/容積率/道路</text>
  <path d="M825 605 V680" class="line"/>
  <rect x="690" y="680" width="270" height="100" rx="22" class="box"/><text x="722" y="718" class="step">7. 概算計算</text><text x="722" y="746" class="text">道路幅員制限 → 適用容積率</text><text x="722" y="768" class="text">建築面積/延床/階数/戸数</text>
  <path d="M690 730 H590" class="line"/>
  <rect x="330" y="685" width="260" height="90" rx="22" class="box"/><text x="362" y="721" class="step">8. 注意事項</text><text x="362" y="749" class="text">不足項目・法規確認を明示</text>
  <path d="M460 775 V850 H520" class="line"/>
  <rect x="520" y="815" width="270" height="90" rx="22" class="box"/><text x="552" y="851" class="step">9. 出力生成</text><text x="552" y="879" class="text">CSV / Excel / TXT</text>
  <path d="M790 860 H890" class="line"/>
  <rect x="890" y="815" width="270" height="90" rx="22" class="box"/><text x="922" y="851" class="step">10. 結果返却</text><text x="922" y="879" class="text">画面表示 + ダウンロードリンク</text>
  <text x="645" y="154" class="label">yes</text><text x="518" y="266" class="label">no</text>
</svg>
