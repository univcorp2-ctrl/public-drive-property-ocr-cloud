{"name":"Property OCR Pipeline","on":{"workflow_dispatch":{},"schedule":[{"cron":"0 21 * * *"}],"push":{"branches":["main"]},"pull_request":{"branches":["main"]}},"jobs":{"test-and-run":{"runs-on":"ubuntu-latest","env":{"GOOGLE_SERVICE_ACCOUNT_JSON":"${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}","TARGET_DRIVE_FOLDER_ID":"${{ secrets.TARGET_DRIVE_FOLDER_ID }}"},"steps":[{"name":"Checkout","uses":"actions/checkout@v4"},{"name":"Set up Python","uses":"actions/setup-python@v5","with":{"python-version":"3.11"}},{"name":"Install dependencies","run":"python -m pip install --upgrade pip\npip install -r requirements.txt"},{"name":"Lint","run":"ruff check ."},{"name":"Test","run":"pytest -vv"},{"name":"Run sample pipeline on pull requests","if":"github.event_name == 'pull_request'","run":"python -m property_ocr_pipeline run --input-dir samples --output-dir outputs"},{"name":"Run Google Drive pipeline","if":"github.event_name != 'pull_request' && env.GOOGLE_SERVICE_ACCOUNT_JSON != '' && env.TARGET_DRIVE_FOLDER_ID != ''","run":"python -m property_ocr_pipeline run --output-dir outputs"},{"name":"Run sample pipeline when Drive secrets are missing","if":"github.event_name != 'pull_request' && (env.GOOGLE_SERVICE_ACCOUNT_JSON == '' || env.TARGET_DRIVE_FOLDER_ID == '')","run":"python -m property_ocr_pipeline run --input-dir samples --output-dir outputs"},{"name":"Upload outputs","uses":"actions/upload-artifact@v4","with":{"name":"property-ocr-outputs","path":"outputs/","if-no-files-found":"error"}}]}}}