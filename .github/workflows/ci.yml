name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: |
          python -m compileall app scripts tests
          ruff check . || true

      - name: Test
        run: pytest -q

      - name: Generate sample outputs
        run: python scripts/generate_sample_outputs.py

      - name: Upload property OCR outputs
        uses: actions/upload-artifact@v4
        with:
          name: property-ocr-outputs
          path: property-ocr-outputs
