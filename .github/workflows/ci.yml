{name: CI, 'on': [push, pull_request, workflow_dispatch], jobs: {test-and-artifact: {runs-on: ubuntu-latest, steps: [{name: Checkout, uses: actions/checkout@v4}, {name: Set up Python, uses: actions/setup-python@v5, with: {python-version: '3.11'}}, {name: Install dependencies, run: 'python -m pip install --upgrade pip && pip install fastapi==0.115.6 uvicorn[standard]==0.34.0 python-multipart==0.0.20 openpyxl==3.1.5 pytest==8.3.4 httpx==0.28.1 ruff==0.9.2'}, {name: Lint, run: 'python -m compileall app/main.py tests/test_api.py scripts/generate_sample_outputs.py && (ruff check app/main.py tests/test_api.py scripts/generate_sample_outputs.py || true)'}, {name: Test, run: 'pytest -q tests/test_api.py'}, {name: Generate sample outputs, run: 'python scripts/generate_sample_outputs.py'}, {name: Upload property OCR outputs, uses: actions/upload-artifact@v4, with: {name: property-ocr-outputs, path: property-ocr-outputs}}]}}}